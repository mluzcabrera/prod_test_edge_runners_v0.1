apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow Simple test
on:
  workflow_dispatch:
    inputs:
      par1:
        type: string
        default: "mlcb_input_par"
env:
  SERVER: production

jobs:
  normal:
    steps:
      - name: My step
        uses: docker://alpine:3.18
        run: echo "Hello $SERVER" 
  remoto:
    with:
      script: |
        echo "Hello world! I'm $(whoami) on $(hostname)"
        
        echo "\033[0;31m Inputs context \033[0m"
        echo "${{ inputs.par1 }}"

        echo "\033[0;31m Vars context \033[0m"
        echo "${{ vars.mlcbUserName }}"

        echo "\033[0;31m CloudBees context \033[0m"
        echo "${{ cloudbees.version }}"
        
        echo "\033[0;31m Env context \033[0m"
        echo "Hello $SERVER" 
      labels: my-label-1
    delegates: https://github.com/mluzcabrera/prod_test_edge_runners_v0.1/custom-job1.yml
